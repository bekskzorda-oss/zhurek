<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 Love Page</title>

<style>
body {
    text-align: center;
    font-family: Arial, sans-serif;
    background: url('https://images.unsplash.com/photo-1518199266791-5375a83190b7?auto=format&fit=crop&w=1200&q=80') no-repeat center/cover;
    color: white;
    overflow: hidden;
    transition: background 1s ease;
}

h1 {
    margin-top: 40px;
    text-shadow: 2px 2px 10px black;
}

.buttons {
    margin-top: 20px;
}

button {
    font-size: 18px;
    padding: 10px 20px;
    margin: 10px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
}

#yesButton {
    background-color: #00c853;
    color: white;
}

#noButton {
    background-color: #d50000;
    color: white;
    position: relative;
}

img {
    margin-top: 20px;
    width: 220px;
    border-radius: 15px;
    box-shadow: 0 0 20px black;
}

#myPhoto {
    display: none;
    width: 250px;
}

/* жүрек */
.heart {
    position: fixed;
    bottom: -10px;
    font-size: 20px;
    animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-100vh); opacity: 0; }
}
</style>
</head>

<body>

<h1 id="question">Сен мені жақсы көресің бе? 💖</h1>

<img id="main-gif" src="https://media.tenor.com/6XbJ3bN0s7wAAAAi/cute-love.gif">

<img id="myPhoto" src="me.jpg">

<div class="buttons">
    <button id="yesButton">Иә</button>
    <button id="noButton">Жоқ</button>
</div>

<!-- 🎵 БІРІНШІ МУЗЫКА (КЕЙІПКЕРІМ) -->
<audio id="music1" loop autoplay>
    <source src="keshikerim.mp3" type="audio/mpeg">
</audio>

<!-- 🎵 ЕКІНШІ МУЗЫКА (СҰЛУЫМ) -->
<audio id="music2" loop>
    <source src="suluym.mp3" type="audio/mpeg">
</audio>

<script>
const yesButton = document.getElementById('yesButton');
const noButton = document.getElementById('noButton');
const question = document.getElementById('question');
const mainGif = document.getElementById('main-gif');
const myPhoto = document.getElementById('myPhoto');

const music1 = document.getElementById('music1');
const music2 = document.getElementById('music2');

// 💓 жүрек
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerText = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 5000);
}
setInterval(createHeart, 300);

// 😈 ЖОҚ
noButton.addEventListener('click', () => {
    document.body.style.backgroundImage = "url('https://images.unsplash.com/photo-1504208434309-cb69f4fe52b0?auto=format&fit=crop&w=1200&q=80')";

    const x = Math.random() * 300 - 150;
    const y = Math.random() * 300 - 150;
    noButton.style.transform = `translate(${x}px, ${y}px)`;
});

// 💖 ИӘ
yesButton.addEventListener('click', () => {

    question.innerText = "Урааа! ❤️";

    mainGif.src = "https://media.tenor.com/gU_Pb_7pVmYAAAAi/cute-omg.gif";

    document.querySelector('.buttons').style.display = 'none';

    // ⛔ кейіпкерім тоқтату
    music1.pause();

    // 🎵 сұлуым қосу
    music2.play();

    // 🌄 фон
    document.body.style.backgroundImage = "url('https://images.unsplash.com/photo-1492724441997-5dc865305da7?auto=format&fit=crop&w=1200&q=80')";

    // 📸 фото
    myPhoto.style.display = "block";
});
</script>

</body>
</html>
