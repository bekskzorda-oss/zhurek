<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 V-Day</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    overflow: hidden;
}

/* screens */
.screen {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.hidden {
    display: none;
}

/* button */
button {
    padding: 12px 24px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    margin: 10px;
}

/* hearts */
.heart {
    position: fixed;
    bottom: -20px;
    font-size: 20px;
    animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-110vh); opacity: 0; }
}

/* photo */
#photo {
    width: 250px;
    border-radius: 15px;
    margin-top: 20px;
    box-shadow: 0 0 20px black;
    display: none;
    animation: fadeIn 1s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
}

#noBtn {
    position: relative;
}
</style>
</head>

<body>

<!-- 💖 START SCREEN -->
<div id="startScreen" class="screen">
    <h1>💖 Welcome</h1>
    <button onclick="startApp()">Start</button>
</div>

<!-- 💌 QUESTION SCREEN -->
<div id="questionScreen" class="screen hidden">
    <h1 id="questionText">Сен мені ұнатасын ба? 💖</h1>

    <div>
        <button id="yesBtn">Иә</button>
        <button id="noBtn">Жоқ</button>
    </div>
</div>

<!-- 🎉 FINAL SCREEN -->
<div id="finalScreen" class="screen hidden">
    <h1>Урааа! ❤️ Мен де сені жақсы көремін!</h1>
    <img id="photo" src="me.jpg">
</div>

<!-- 🎵 MUSIC -->
<audio id="music" loop>
    <source src="suluym.mp3" type="audio/mpeg">
</audio>

<script>
const startScreen = document.getElementById("startScreen");
const questionScreen = document.getElementById("questionScreen");
const finalScreen = document.getElementById("finalScreen");

const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const music = document.getElementById("music");

const questionText = document.getElementById("questionText");
const photo = document.getElementById("photo");

const phrases = [
    "Жоқ",
    "Сенімдісің бе? 🤨",
    "Өтінемін 🥺",
    "Қайта ойланшы!",
    "Жүрегім ауырып тұр 💔",
    "Мұңайтпашы...",
    "Бәрібір ИӘ деп басшы ✨"
];

let phraseIndex = 0;

/* 🎬 start app */
function startApp() {
    startScreen.classList.add("hidden");
    questionScreen.classList.remove("hidden");

    music.play();

    createHearts();
}

/* 💓 hearts */
function createHearts() {
    setInterval(() => {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerText = "💖";
        heart.style.left = Math.random() * 100 + "vw";
        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 6000);
    }, 300);
}

/* 😈 NO BUTTON */
noBtn.addEventListener("click", () => {

    noBtn.innerText = phrases[phraseIndex];
    phraseIndex = (phraseIndex + 1) % phrases.length;

    const x = Math.random() * 300 - 150;
    const y = Math.random() * 300 - 150;
    noBtn.style.transform = `translate(${x}px, ${y}px)`;

    yesBtn.style.fontSize = (parseInt(window.getComputedStyle(yesBtn).fontSize) + 2) + "px";
});

/* 💖 YES BUTTON */
yesBtn.addEventListener("click", () => {

    questionScreen.classList.add("hidden");
    finalScreen.classList.remove("hidden");

    document.body.style.background = "linear-gradient(135deg,#ff4d6d,#ffb3c1)";

    photo.style.display = "block";
});
</script>

</body>
</html>
