<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 V-Day Interactive</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: url('https://images.unsplash.com/photo-1518199266791-5375a83190b7?auto=format&fit=crop&w=1200&q=80') no-repeat center/cover;
    color: white;
    overflow: hidden;
    transition: background 1s ease;
}

.screen {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.hidden { display: none; }

button {
    padding: 12px 24px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    margin: 10px;
}

#yesBtn { background-color: #00c853; color: white; }
#noBtn { background-color: #d50000; color: white; position: relative; }

.heart { position: fixed; bottom: -20px; font-size: 20px; animation: floatUp 6s linear infinite; }
@keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-110vh); opacity: 0; } }

#finalPhotos img {
    width: 200px;
    margin: 10px;
    border-radius: 15px;
    display: none;
    animation: fadeIn 1s ease;
}

@keyframes fadeIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
</style>
</head>

<body>

<!-- Start Screen -->
<div id="startScreen" class="screen">
    <h1>💖 Welcome</h1>
    <button onclick="startApp()">Start</button>
</div>

<!-- Question Screen -->
<div id="questionScreen" class="screen hidden">
    <h1 id="questionText">Сен мені жақсы көресің бе? 💖</h1>
    <div>
        <button id="yesBtn">Иә</button>
        <button id="noBtn">Жоқ</button>
    </div>
</div>

<!-- Final Screen -->
<div id="finalScreen" class="screen hidden">
    <h1>Урааа! Мен де сені жақсы көремін! ❤️✨</h1>
    <div id="finalPhotos">
        <img src="me.jpg">
        <img src="me.jpg">
        <img src="me.jpg">
    </div>
</div>

<!-- Music -->
<audio id="music" loop>
    <source src="suluym.mp3" type="audio/mpeg">
</audio>

<script>
const startScreen = document.getElementById("startScreen");
const questionScreen = document.getElementById("questionScreen");
const finalScreen = document.getElementById("finalScreen");

const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const music = document.getElementById("music");
const questionText = document.getElementById("questionText");
const finalPhotos = document.getElementById("finalPhotos");

const phrases = [
    "Жоқ",
    "Сенімдісің бе? 🤨",
    "Өтінемін 🥺",
    "Қайта ойланшы!",
    "Жүрегім ауырып тұр 💔",
    "Мұңайтпашы...",
    "Бәрібір ИӘ деп басшы ✨"
];

let phraseIndex = 0;
let yesSize = 18;

// 💖 Start App
function startApp() {
    startScreen.classList.add("hidden");
    questionScreen.classList.remove("hidden");
    music.play();
    setInterval(createHeart, 300);
}

// 💓 Hearts
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerText = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
}

// 😈 NO Button
noBtn.addEventListener("click", () => {

    // text change
    noBtn.innerText = phrases[phraseIndex];
    phraseIndex = (phraseIndex + 1) % phrases.length;

    // Yes button grows
    yesSize += 5;
    yesBtn.style.fontSize = yesSize + "px";

    // No button moves
    const x = Math.random() * 300 - 150;
    const y = Math.random() * 200 - 100;
    noBtn.style.transform = `translate(${x}px, ${y}px)`;
});

// 💖 YES Button
yesBtn.addEventListener("click", () => {
    questionScreen.classList.add("hidden");
    finalScreen.classList.remove("hidden");

    // background change
    document.body.style.background = "linear-gradient(135deg,#ff4d6d,#ffb3c1)";

    // show all photos
    const photos = finalPhotos.querySelectorAll("img");
    photos.forEach(img => img.style.display = "inline-block");
});
</script>

</body>
</html>
